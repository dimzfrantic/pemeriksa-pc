<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
<title>{% block title %}{{ APP_TITLE }}{% endblock %}</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<header class="topbar">
  <div class="brand">🖥️ {{ APP_TITLE }}</div>
  <nav class="nav">
    <a href="{{ url_for('main.index') }}">Dashboard</a>
    <a href="{{ url_for('pc.add') }}">+ Tambah PC</a>
    <a href="{{ url_for('insp.add') }}">+ Pemeriksaan</a>
    <a href="{{ url_for('insp.history') }}">Riwayat</a>
  </nav>
</header>

<main class="container">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="flashes">
      {% for cat, msg in messages %}
        <div class="flash flash-{{ cat }}">{{ msg }}</div>
      {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  {% block content %}{% endblock %}
</main>

<footer class="footer">
  <small>{{ APP_TITLE }} · lokal · port 5080</small>
</footer>
</body>
</html>
